<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏人格测试 - 你的本命游戏是什么？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-1: #8B5CF6;
            --primary-2: #06B6D4;
            --primary-3: #EC4899;
            --bg-1: #0F0F1A;
            --bg-2: #1A1A2E;
            --bg-3: #16213E;
            --text-1: #FFFFFF;
            --text-2: #E0E0E0;
            --text-3: #A0A0A0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --gradient-1: linear-gradient(135deg, #8B5CF6, #EC4899);
            --gradient-2: linear-gradient(135deg, #06B6D4, #8B5CF6);
            --gradient-3: linear-gradient(135deg, #EC4899, #06B6D4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* 像素风格背景 */
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #1a1a2e;
            background-image: 
                linear-gradient(transparent 0%, rgba(0,0,0,0.1) 50%, transparent 50%),
                linear-gradient(90deg, rgba(255,0,0,0.03) 0%, transparent 33%, rgba(0,255,0,0.03) 66%, transparent 100%);
            background-size: 4px 4px, 12px 12px;
            image-rendering: pixelated;
        }

        /* 像素星星装饰 */
        .pixel-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .pixel-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            animation: twinkle 2s ease-in-out infinite;
        }

        .pixel-star::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            top: -4px;
            left: 0;
        }

        .pixel-star::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            bottom: -4px;
            left: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 浮动装饰元素 */
        .floating-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            font-size: 16px;
            opacity: 0.4;
            animation: float 15s ease-in-out infinite;
            /* 像素风格 */
            image-rendering: pixelated;
            font-family: monospace;
        }

        .floating-icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-icon:nth-child(2) { top: 20%; right: 15%; animation-delay: -3s; font-size: 20px; }
        .floating-icon:nth-child(3) { top: 60%; left: 5%; animation-delay: -6s; }
        .floating-icon:nth-child(4) { top: 70%; right: 10%; animation-delay: -9s; font-size: 18px; }
        .floating-icon:nth-child(5) { top: 40%; left: 85%; animation-delay: -12s; }
        .floating-icon:nth-child(6) { bottom: 15%; left: 20%; animation-delay: -2s; font-size: 14px; }
        .floating-icon:nth-child(7) { bottom: 25%; right: 25%; animation-delay: -5s; }
        .floating-icon:nth-child(8) { top: 85%; left: 70%; animation-delay: -8s; font-size: 22px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(90deg); }
            50% { transform: translateY(-8px) rotate(180deg); }
            75% { transform: translateY(-20px) rotate(270deg); }
        }

        /* 网格线背景 - 像素风格 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.08) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        /* 扫描线效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.03) 0px,
                rgba(0, 0, 0, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.5;
        }

        /* 容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* 页面 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 欢迎页 */
        .welcome-page {
            text-align: center;
            padding: 60px 20px;
        }

        .logo-container {
            margin-bottom: 40px;
            position: relative;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: var(--gradient-1);
            border-radius: 40px;
            filter: blur(60px);
            opacity: 0.4;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: var(--gradient-1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 
                0 0 60px rgba(139, 92, 246, 0.4),
                0 0 100px rgba(236, 72, 153, 0.2);
            animation: pulse 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 60px rgba(139, 92, 246, 0.4), 0 0 100px rgba(236, 72, 153, 0.2); }
            50% { box-shadow: 0 0 80px rgba(139, 92, 246, 0.6), 0 0 120px rgba(236, 72, 153, 0.4); }
        }

        .main-title {
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
        }

        .subtitle {
            font-size: clamp(16px, 4vw, 20px);
            color: var(--text-3);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
        }

        .tag {
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            font-size: 14px;
            color: var(--primary-1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .tag:hover::before {
            left: 100%;
        }

        .tag:hover {
            background: rgba(139, 92, 246, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.2);
        }

        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 50px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: var(--gradient-1);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 50px rgba(139, 92, 246, 0.5);
        }

        .start-btn svg {
            width: 24px;
            height: 24px;
            position: relative;
            z-index: 1;
        }

        .welcome-tip {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-3);
        }

        .welcome-tip span {
            color: var(--primary-2);
        }

        /* 装饰性分隔线 */
        .decorative-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 30px 0;
            opacity: 0.6;
        }

        .divider-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-1), transparent);
        }

        .divider-icon {
            font-size: 12px;
        }

        /* 测试页 */
        .test-page {
            padding: 40px 20px;
        }

        .progress-container {
            margin-bottom: 40px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-3);
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
        }

        .question-number {
            display: inline-block;
            padding: 6px 16px;
            background: var(--gradient-1);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .question-text {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option {
            padding: 20px 24px;
            background: rgba(15, 15, 26, 0.6);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.1), transparent);
            transition: left 0.3s ease;
        }

        .option:hover::before {
            left: 100%;
        }

        .option:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--primary-1);
            transform: translateX(5px);
        }

        .option.selected {
            background: rgba(139, 92, 246, 0.25);
            border-color: var(--primary-1);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }

        .option-letter {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-2);
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .option.selected .option-letter {
            background: var(--gradient-1);
        }

        .option-text {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-2);
            position: relative;
            z-index: 1;
        }

        .option.selected .option-text {
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.prev {
            background: transparent;
            border: 2px solid var(--primary-1);
            color: var(--primary-1);
        }

        .nav-btn.prev:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .nav-btn.next {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 5px 30px rgba(139, 92, 246, 0.4);
        }

        .nav-btn.next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(139, 92, 246, 0.5);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 结果页 */
        .result-page {
            padding: 40px 20px;
            text-align: center;
        }

        .result-header {
            margin-bottom: 40px;
            position: relative;
        }

        /* 人格头像 */
        .result-avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 24px;
        }

        .result-avatar-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            background: var(--gradient-1);
            border-radius: 30px;
            filter: blur(40px);
            opacity: 0.4;
            animation: avatarGlow 3s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.08); }
        }

        .result-avatar {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 24px;
            object-fit: cover;
            border: 3px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.3), 0 0 80px rgba(236, 72, 153, 0.15);
            z-index: 1;
            background: var(--bg-2);
        }

        .result-avatar-container.hidden {
            display: none;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            font-size: 14px;
            color: var(--primary-2);
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 16px;
            color: var(--text-3);
            margin-bottom: 16px;
        }

        .result-type {
            font-size: clamp(40px, 10vw, 64px);
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: resultGlow 2s ease-in-out infinite;
        }

        @keyframes resultGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.5)); }
        }

        .result-name {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 20px;
        }

        .result-quote {
            font-size: 18px;
            color: var(--primary-2);
            font-style: italic;
            padding: 20px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 16px;
            border-left: 4px solid var(--primary-2);
            text-align: left;
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }

        .result-quote::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 40px;
            color: var(--primary-2);
            opacity: 0.3;
            font-family: serif;
        }

        .result-desc {
            font-size: 16px;
            color: var(--text-2);
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 40px;
            text-align: left;
            padding: 24px;
            background: rgba(26, 26, 46, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .dimensions-result {
            margin-bottom: 40px;
        }

        .dimensions-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dimensions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .dimension-item {
            padding: 16px;
            background: rgba(15, 15, 26, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }

        .dimension-item:hover {
            border-color: var(--primary-1);
            transform: translateY(-3px);
        }

        .dimension-label {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        .dimension-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-2);
        }

        .games-section {
            margin-bottom: 40px;
        }

        .games-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .games-title::before,
        .games-title::after {
            content: '';
            width: 40px;
            height: 2px;
            background: var(--gradient-1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .game-card {
            padding: 24px 20px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-1);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.2);
        }

        .game-card.highlight {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--primary-1);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .game-card.highlight .game-tag {
            background: rgba(139, 92, 246, 0.3);
            color: var(--primary-1);
        }

        .game-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            background: var(--gradient-2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }

        .game-initial {
            font-size: 28px;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .game-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .game-tag {
            font-size: 12px;
            padding: 4px 12px;
            background: rgba(6, 182, 212, 0.2);
            color: var(--primary-2);
            border-radius: 50px;
            display: inline-block;
        }

        .game-meta {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        /* ===== 皇室战争专属展示区 ===== */
        .cr-showcase {
            max-width: 560px;
            margin: 0 auto;
            padding: 36px 28px 32px;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.95), rgba(45, 20, 80, 0.85));
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, #8B5CF6, #EC4899, #F59E0B, #8B5CF6) 1;
            border-radius: 0;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        /* 用伪元素实现圆角渐变边框 */
        .cr-showcase {
            border: none;
            border-radius: 24px;
            position: relative;
        }

        .cr-showcase::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, #8B5CF6, #EC4899, #F59E0B, #06B6D4, #8B5CF6);
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: crBorderFlow 4s linear infinite;
            z-index: 0;
        }

        @keyframes crBorderFlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景光晕 */
        .cr-showcase::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.12) 0%, transparent 60%);
            animation: crGlow 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes crGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%      { opacity: 1; transform: scale(1.1); }
        }

        .cr-showcase > * { position: relative; z-index: 1; }

        .cr-icon-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(139, 92, 246, 0.5),
                        0 0 60px rgba(236, 72, 153, 0.3);
            animation: crIconFloat 3s ease-in-out infinite;
        }

        @keyframes crIconFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .cr-icon-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cr-crown {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
            animation: crCrownBounce 2s ease-in-out infinite;
        }

        @keyframes crCrownBounce {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            25%      { transform: rotate(5deg) scale(1.15); }
            50%      { transform: rotate(-3deg) scale(1.05); }
            75%      { transform: rotate(3deg) scale(1.1); }
        }

        .cr-title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF6347, #FFD700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: crTitleShine 3s linear infinite;
            margin-bottom: 6px;
        }

        @keyframes crTitleShine {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .cr-subtitle {
            font-size: 14px;
            color: #F59E0B;
            font-weight: 700;
            letter-spacing: 0.12em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
        }

        .cr-desc {
            text-align: left;
            font-size: 14px;
            line-height: 2;
            color: rgba(255,255,255,0.88);
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.15);
            margin-bottom: 20px;
        }

        .cr-desc .cr-line {
            display: block;
            margin-bottom: 4px;
        }

        .cr-desc .cr-highlight {
            color: #F59E0B;
            font-weight: 700;
        }

        .cr-desc .cr-purple {
            color: #8B5CF6;
            font-weight: 700;
        }

        .cr-desc .cr-pink {
            color: #EC4899;
            font-weight: 600;
        }

        .cr-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .cr-tag {
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: 600;
            background: rgba(139, 92, 246, 0.2);
            color: #A78BFA;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .cr-tag.gold {
            background: rgba(245, 158, 11, 0.2);
            color: #F59E0B;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .cr-tag.pink {
            background: rgba(236, 72, 153, 0.2);
            color: #EC4899;
            border-color: rgba(236, 72, 153, 0.3);
        }

        @media (max-width: 480px) {
            .cr-showcase { padding: 24px 16px 20px; }
            .cr-icon-wrap { width: 90px; height: 90px; border-radius: 22px; }
            .cr-title { font-size: 22px; }
            .cr-desc { font-size: 13px; padding: 14px; }
        }

        .game-score {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.25), rgba(6, 182, 212, 0.15));
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #10B981;
            border-radius: 20px;
        }

        .game-platform {
            font-size: 10px;
            padding: 2px 7px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: var(--text-3);
            border-radius: 20px;
        }

        /* ===== 首页入场动画 ===== */
        @keyframes heroFadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes heroScaleIn {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }

        @keyframes heroSlideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes tagStagger {
            from { opacity: 0; transform: translateY(16px) scale(0.9); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes artMottoReveal {
            0%   { opacity: 0; letter-spacing: 0.5em; filter: blur(8px); }
            60%  { opacity: 0.8; letter-spacing: 0.12em; filter: blur(2px); }
            100% { opacity: 1; letter-spacing: 0.08em; filter: blur(0); }
        }

        @keyframes artMottoUnderline {
            from { width: 0; }
            to   { width: 100%; }
        }

        .welcome-page .logo-container {
            animation: heroFadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.1s;
        }

        .welcome-page .logo-icon {
            animation: heroScaleIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            animation-delay: 0.2s;
        }

        .welcome-page .main-title {
            animation: heroFadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.35s;
        }

        .welcome-page .subtitle {
            animation: heroFadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.5s;
        }

        .welcome-page .tags .tag:nth-child(1) { animation: tagStagger 0.5s ease both; animation-delay: 0.65s; }
        .welcome-page .tags .tag:nth-child(2) { animation: tagStagger 0.5s ease both; animation-delay: 0.75s; }
        .welcome-page .tags .tag:nth-child(3) { animation: tagStagger 0.5s ease both; animation-delay: 0.85s; }
        .welcome-page .tags .tag:nth-child(4) { animation: tagStagger 0.5s ease both; animation-delay: 0.95s; }

        .welcome-page .start-btn {
            animation: heroScaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            animation-delay: 1.1s;
        }

        .welcome-page .decorative-divider,
        .welcome-page .welcome-tip {
            animation: heroFadeUp 0.6s ease both;
            animation-delay: 1.25s;
        }

        /* ===== 第九艺术 超级特效 ===== */
        .art-motto {
            margin-top: 40px;
            margin-bottom: 8px;
            text-align: center;
            position: relative;
        }

        .art-motto-wrap {
            position: relative;
            display: inline-block;
            padding: 18px 40px 20px;
        }

        /* 外层光晕框 */
        .art-motto-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            background: linear-gradient(135deg,
                rgba(139,92,246,0.18),
                rgba(236,72,153,0.12),
                rgba(6,182,212,0.18));
            border: 1px solid transparent;
            background-clip: padding-box;
            animation: mottoBoxPulse 3s ease-in-out infinite;
            animation-delay: 2.2s;
            opacity: 0;
        }

        /* 流光边框 */
        .art-motto-wrap::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 16px;
            background: linear-gradient(90deg,
                transparent 0%,
                #8B5CF6 20%,
                #EC4899 40%,
                #06B6D4 60%,
                #8B5CF6 80%,
                transparent 100%);
            background-size: 300% 100%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box,
                          linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            padding: 1px;
            animation: borderFlow 3s linear infinite;
            animation-delay: 2.2s;
            opacity: 0;
        }

        @keyframes mottoBoxPulse {
            0%   { opacity: 0; }
            10%  { opacity: 1; }
            50%  { opacity: 0.7; }
            100% { opacity: 0.9; }
        }

        @keyframes borderFlow {
            0%   { background-position: 0% 0; opacity: 0; }
            5%   { opacity: 1; }
            100% { background-position: 300% 0; opacity: 1; }
        }

        /* 主文字容器 */
        .art-motto-text {
            display: inline-flex;
            align-items: center;
            gap: 0;
            font-size: clamp(20px, 5vw, 32px);
            font-weight: 900;
            letter-spacing: 0.15em;
            position: relative;
        }

        /* 每个字 */
        .art-char {
            display: inline-block;
            position: relative;
            opacity: 0;
            background: linear-gradient(135deg, #fff 0%, #e0c3fc 40%, #8B5CF6 70%, #EC4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(139,92,246,0.9))
                    drop-shadow(0 0 30px rgba(236,72,153,0.6));
            animation: charDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 顿号/标点用不同颜色 */
        .art-char.punct {
            background: linear-gradient(135deg, #06B6D4, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(6,182,212,0.9));
        }

        @keyframes charDrop {
            0%   { opacity: 0; transform: translateY(-40px) scale(0.5) rotate(-8deg); filter: drop-shadow(0 0 30px rgba(139,92,246,1)) blur(4px); }
            60%  { opacity: 1; transform: translateY(4px) scale(1.1) rotate(2deg); filter: drop-shadow(0 0 20px rgba(139,92,246,0.9)); }
            80%  { transform: translateY(-2px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: drop-shadow(0 0 12px rgba(139,92,246,0.8)) drop-shadow(0 0 30px rgba(236,72,153,0.5)); }
        }

        /* 每个字动画延迟 */
        .art-char:nth-child(1)  { animation-delay: 1.5s; }
        .art-char:nth-child(2)  { animation-delay: 1.7s; }
        .art-char:nth-child(3)  { animation-delay: 1.9s; }
        .art-char:nth-child(4)  { animation-delay: 2.1s; }
        .art-char:nth-child(5)  { animation-delay: 2.3s; }
        .art-char:nth-child(6)  { animation-delay: 2.5s; }
        .art-char:nth-child(7)  { animation-delay: 2.7s; }
        .art-char:nth-child(8)  { animation-delay: 2.9s; }

        /* 持续光效扫描 */
        .art-motto-text::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: textSweep 3.5s ease-in-out infinite;
            animation-delay: 3.5s;
            pointer-events: none;
        }

        @keyframes textSweep {
            0%   { left: -60%; opacity: 0; }
            10%  { opacity: 1; }
            100% { left: 120%; opacity: 0; }
        }

        /* 底部光线 */
        .art-motto-line {
            display: block;
            height: 2px;
            width: 0;
            margin: 10px auto 0;
            border-radius: 2px;
            background: linear-gradient(90deg, transparent, #8B5CF6, #EC4899, #06B6D4, transparent);
            box-shadow: 0 0 10px rgba(139,92,246,0.8), 0 0 20px rgba(236,72,153,0.5);
            animation: lineExpand 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: 3.1s;
        }

        @keyframes lineExpand {
            from { width: 0; opacity: 0; }
            to   { width: 80%; opacity: 1; }
        }

        /* 粒子闪烁 */
        .art-sparks {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 80px;
            pointer-events: none;
            overflow: visible;
        }

        .spark {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            opacity: 0;
            animation: sparkFly 1.2s ease-out forwards;
        }

        @keyframes sparkFly {
            0%   { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: var(--spark-end) scale(0); }
        }

        /* 副文字 */
        .art-sub {
            display: block;
            font-size: 11px;
            letter-spacing: 0.3em;
            color: rgba(160,160,160,0.7);
            text-transform: uppercase;
            margin-top: 6px;
            opacity: 0;
            animation: heroFadeUp 0.6s ease forwards;
            animation-delay: 3.2s;
        }

        .share-section {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .share-card {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 600px;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 24px;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .share-card-inner {
            text-align: center;
        }

        .share-logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .share-type {
            font-size: 14px;
            color: var(--primary-2);
            margin-bottom: 8px;
        }

        .share-name {
            font-size: 36px;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .share-quote {
            font-size: 16px;
            color: var(--primary-2);
            font-style: italic;
            padding: 16px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .share-games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .share-game-item {
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 50px;
            font-size: 14px;
        }

        .share-qr {
            font-size: 14px;
            color: var(--text-3);
            padding-top: 16px;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .screenshot-btn {
            background: var(--gradient-1);
        }

        .share-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .share-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            background: rgba(139, 92, 246, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .share-action-btn:hover {
            background: rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
        }

        .link-btn {
            background: var(--gradient-2);
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 36px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: var(--gradient-3);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 30px rgba(236, 72, 153, 0.4);
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(236, 72, 153, 0.5);
        }

        .restart-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-1);
            background: transparent;
            border: 2px solid var(--primary-1);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top-color: var(--primary-1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: var(--text-2);
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .question-card {
                padding: 24px 16px;
            }

            .option {
                padding: 14px 16px;
            }

            .option-letter {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .nav-btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 15px;
            }

            .floating-icon {
                display: none;
            }

            .share-section {
                padding: 0 10px;
            }

            .share-btn, .share-action-btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
                font-size: 15px;
                padding: 14px 20px;
            }

            .share-actions {
                width: 100%;
                flex-direction: column;
                align-items: center;
            }

            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .game-card {
                padding: 16px 12px;
            }

            .game-icon {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }

            .game-name {
                font-size: 14px;
            }

            .result-avatar-container {
                width: 150px;
                height: 150px;
            }

            .result-avatar {
                width: 150px;
                height: 150px;
                border-radius: 20px;
            }

            .result-avatar-glow {
                width: 170px;
                height: 170px;
            }

            .result-type {
                font-size: 36px;
            }

            .result-name {
                font-size: 22px;
            }

            .share-card {
                width: 100%;
                padding: 24px;
                border-radius: 16px;
            }

            .share-name {
                font-size: 28px;
            }

            .share-game-item {
                font-size: 12px;
                padding: 6px 12px;
            }

            .dimensions-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .dimension-item {
                padding: 12px;
            }

            .welcome-page {
                padding: 40px 16px;
            }

            .logo-icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }

            .start-btn {
                padding: 16px 36px;
                font-size: 18px;
            }

            .main-title {
                font-size: 32px;
            }

            .container {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .tag {
                padding: 6px 14px;
                font-size: 12px;
            }

            .question-text {
                font-size: 16px;
            }

            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .dimension-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-bg"></div>
    <div class="grid-bg"></div>
    <div class="pixel-stars" id="pixelStars"></div>
    <div class="scanlines"></div>

        function selectOption(index) {
            const q = questions[currentQuestion];
            
            // 如果之前已选过，先减去旧选项分数
            if (answers[currentQuestion] !== undefined) {
                const oldScore = q.options[answers[currentQuestion]].score;
                for (let dim in oldScore) {
                    scores[dim] -= oldScore[dim];
                }
            }
            
            answers[currentQuestion] = index;
            
            // 累加新选项分数
            const selectedScore = q.options[index].score;
            for (let dim in selectedScore) {
                scores[dim] += selectedScore[dim];
            }

            // 更新选项样式
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
            document.getElementById('nextBtn').disabled = false;
        }

        // ==================== 结果计算 ====================
        function calculateResult() {
            // 动态计算maxScores：遍历所有题目，取每题对某维度最大可能分值的累加
            const dims = ['dedication', 'social', 'competitive', 'exploration', 'action'];
            const maxScores = {};
            dims.forEach(dim => {
                maxScores[dim] = 0;
                questions.forEach(q => {
                    let maxForQ = 0;
                    q.options.forEach(opt => {
                        if (opt.score[dim] > maxForQ) maxForQ = opt.score[dim];
                    });
                    maxScores[dim] += maxForQ;
                });
            });

            // 计算百分比
            const percentages = {};
            for (let dim of dims) {
                percentages[dim] = maxScores[dim] > 0 ? Math.round((scores[dim] / maxScores[dim]) * 100) : 0;
            }

            return matchPersonality(percentages);
        }

        function matchPersonality(pcts) {
            // 14种人格标准画像向量 (L=25, M=50, H=75)
            // 每种人格有独特的5维位置
            const profiles = {
                "GOD_HAND":          { dedication: 60, social: 25, competitive: 75, exploration: 30, action: 75 },
                "STRATEGIST":        { dedication: 60, social: 40, competitive: 55, exploration: 70, action: 50 },
                "SOCIAL_BUTTERFLY":  { dedication: 45, social: 75, competitive: 25, exploration: 40, action: 30 },
                "COLLECTOR":         { dedication: 75, social: 25, competitive: 25, exploration: 75, action: 35 },
                "CHILL_GAMER":       { dedication: 20, social: 40, competitive: 15, exploration: 30, action: 15 },
                "TOXIC_GAMER":       { dedication: 70, social: 55, competitive: 75, exploration: 25, action: 50 },
                "NIGHT_OWL":         { dedication: 75, social: 20, competitive: 65, exploration: 35, action: 55 },
                "CASUAL_CUTE":       { dedication: 35, social: 55, competitive: 15, exploration: 60, action: 15 },
                "HARDCORE":          { dedication: 75, social: 20, competitive: 50, exploration: 40, action: 75 },
                "GUILD_LEADER":      { dedication: 65, social: 75, competitive: 50, exploration: 40, action: 45 },
                "MOBILE_MASTER":     { dedication: 30, social: 50, competitive: 45, exploration: 30, action: 35 },
                "STORY_LOVER":       { dedication: 55, social: 25, competitive: 15, exploration: 75, action: 30 },
                "OPEN_WORLD":        { dedication: 45, social: 30, competitive: 20, exploration: 75, action: 45 },
                "GACHA_MASTER":      { dedication: 70, social: 35, competitive: 25, exploration: 65, action: 25 }
            };

            // 每种人格的关键维度（权重1.5），非关键维度权重1.0
            const keyDims = {
                "GOD_HAND":          ["competitive", "action"],
                "STRATEGIST":        ["exploration", "competitive"],
                "SOCIAL_BUTTERFLY":  ["social"],
                "COLLECTOR":         ["exploration", "dedication"],
                "CHILL_GAMER":       ["competitive", "dedication", "action"], // 反向关键
                "TOXIC_GAMER":       ["competitive", "dedication"],
                "NIGHT_OWL":         ["dedication", "competitive"],
                "CASUAL_CUTE":       ["action", "exploration"],
                "HARDCORE":          ["action", "dedication"],
                "GUILD_LEADER":      ["social", "dedication"],
                "MOBILE_MASTER":     ["dedication", "social"],
                "STORY_LOVER":       ["exploration", "competitive"],
                "OPEN_WORLD":        ["exploration", "action"],
                "GACHA_MASTER":      ["dedication", "exploration"]
            };

            let bestMatch = "CHILL_GAMER";
            let bestDist = Infinity;

            const dims = ['dedication', 'social', 'competitive', 'exploration', 'action'];

            for (let pKey in profiles) {
                const profile = profiles[pKey];
                const keys = keyDims[pKey] || [];
                let dist = 0;

                for (let dim of dims) {
                    const diff = pcts[dim] - profile[dim];
                    const weight = keys.includes(dim) ? 1.5 : 1.0;
                    dist += weight * diff * diff;
                }
                dist = Math.sqrt(dist);

                if (dist < bestDist) {
                    bestDist = dist;
                    bestMatch = pKey;
                }
            }

            return bestMatch;
        }

        // 通用复制函数，兼容非HTTPS环境
        function copyTextToClipboard(text, successMsg) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    alert(successMsg);
                }).catch(() => {
                    fallbackCopy(text, successMsg);
                });
            } else {
                fallbackCopy(text, successMsg);
            }
        }

        function fallbackCopy(text, successMsg) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
                alert(successMsg);
            } catch (e) {
                alert('复制失败，请手动复制以下内容：\n\n' + text);
            }
            document.body.removeChild(ta);
        }

        // 初始化像素星星背景
        function initPixelStars() {
            const container = document.getElementById('pixelStars');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'pixel-star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        initPixelStars();
        checkUrlParams();

        // 第九艺术粒子特效
        function initArtSparks() {
            const container = document.getElementById('artSparks');
            if (!container) return;
            const colors = ['#8B5CF6','#EC4899','#06B6D4','#fff','#F59E0B','#10B981'];
            const count = 24;
            setTimeout(() => {
                for (let i = 0; i < count; i++) {
                    const s = document.createElement('div');
                    s.className = 'spark';
                    const angle = (i / count) * 360;
                    const dist = 80 + Math.random() * 120;
                    const dx = Math.cos(angle * Math.PI / 180) * dist;
                    const dy = Math.sin(angle * Math.PI / 180) * dist;
                    s.style.cssText = `
                        left: 50%; top: 50%;
                        background: ${colors[i % colors.length]};
                        box-shadow: 0 0 6px 2px ${colors[i % colors.length]};
                        width: ${2 + Math.random() * 4}px;
                        height: ${2 + Math.random() * 4}px;
                        --spark-end: translate(${dx}px, ${dy}px) scale(0);
                        animation-delay: ${2.9 + Math.random() * 0.4}s;
                        animation-duration: ${0.8 + Math.random() * 0.6}s;
                    `;
                    container.appendChild(s);
                }
            }, 0);
        }
        initArtSparks();
    </script>
