<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏人格测试 - 你的本命游戏是什么？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-1: #8B5CF6;
            --primary-2: #06B6D4;
            --primary-3: #EC4899;
            --bg-1: #0F0F1A;
            --bg-2: #1A1A2E;
            --bg-3: #16213E;
            --text-1: #FFFFFF;
            --text-2: #E0E0E0;
            --text-3: #A0A0A0;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --gradient-1: linear-gradient(135deg, #8B5CF6, #EC4899);
            --gradient-2: linear-gradient(135deg, #06B6D4, #8B5CF6);
            --gradient-3: linear-gradient(135deg, #EC4899, #06B6D4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-1);
            color: var(--text-1);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* 像素风格背景 */
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #1a1a2e;
            background-image: 
                linear-gradient(transparent 0%, rgba(0,0,0,0.1) 50%, transparent 50%),
                linear-gradient(90deg, rgba(255,0,0,0.03) 0%, transparent 33%, rgba(0,255,0,0.03) 66%, transparent 100%);
            background-size: 4px 4px, 12px 12px;
            image-rendering: pixelated;
        }

        /* 像素星星装饰 */
        .pixel-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .pixel-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            animation: twinkle 2s ease-in-out infinite;
        }

        .pixel-star::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            top: -4px;
            left: 0;
        }

        .pixel-star::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            bottom: -4px;
            left: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 浮动装饰元素 */
        .floating-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-icon {
            position: absolute;
            font-size: 16px;
            opacity: 0.4;
            animation: float 15s ease-in-out infinite;
            /* 像素风格 */
            image-rendering: pixelated;
            font-family: monospace;
        }

        .floating-icon:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-icon:nth-child(2) { top: 20%; right: 15%; animation-delay: -3s; font-size: 20px; }
        .floating-icon:nth-child(3) { top: 60%; left: 5%; animation-delay: -6s; }
        .floating-icon:nth-child(4) { top: 70%; right: 10%; animation-delay: -9s; font-size: 18px; }
        .floating-icon:nth-child(5) { top: 40%; left: 85%; animation-delay: -12s; }
        .floating-icon:nth-child(6) { bottom: 15%; left: 20%; animation-delay: -2s; font-size: 14px; }
        .floating-icon:nth-child(7) { bottom: 25%; right: 25%; animation-delay: -5s; }
        .floating-icon:nth-child(8) { top: 85%; left: 70%; animation-delay: -8s; font-size: 22px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(90deg); }
            50% { transform: translateY(-8px) rotate(180deg); }
            75% { transform: translateY(-20px) rotate(270deg); }
        }

        /* 网格线背景 - 像素风格 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.08) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        /* 扫描线效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.03) 0px,
                rgba(0, 0, 0, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.5;
        }

        /* 容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* 页面 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 欢迎页 */
        .welcome-page {
            text-align: center;
            padding: 60px 20px;
        }

        .logo-container {
            margin-bottom: 40px;
            position: relative;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: var(--gradient-1);
            border-radius: 40px;
            filter: blur(60px);
            opacity: 0.4;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: var(--gradient-1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 
                0 0 60px rgba(139, 92, 246, 0.4),
                0 0 100px rgba(236, 72, 153, 0.2);
            animation: pulse 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 60px rgba(139, 92, 246, 0.4), 0 0 100px rgba(236, 72, 153, 0.2); }
            50% { box-shadow: 0 0 80px rgba(139, 92, 246, 0.6), 0 0 120px rgba(236, 72, 153, 0.4); }
        }

        .main-title {
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
        }

        .subtitle {
            font-size: clamp(16px, 4vw, 20px);
            color: var(--text-3);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
        }

        .tag {
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            font-size: 14px;
            color: var(--primary-1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .tag:hover::before {
            left: 100%;
        }

        .tag:hover {
            background: rgba(139, 92, 246, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.2);
        }

        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 20px 50px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: var(--gradient-1);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 50px rgba(139, 92, 246, 0.5);
        }

        .start-btn svg {
            width: 24px;
            height: 24px;
            position: relative;
            z-index: 1;
        }

        .welcome-tip {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-3);
        }

        .welcome-tip span {
            color: var(--primary-2);
        }

        /* 装饰性分隔线 */
        .decorative-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 30px 0;
            opacity: 0.6;
        }

        .divider-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-1), transparent);
        }

        .divider-icon {
            font-size: 12px;
        }

        /* 测试页 */
        .test-page {
            padding: 40px 20px;
        }

        .progress-container {
            margin-bottom: 40px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-3);
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-card {
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
        }

        .question-number {
            display: inline-block;
            padding: 6px 16px;
            background: var(--gradient-1);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .question-text {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option {
            padding: 20px 24px;
            background: rgba(15, 15, 26, 0.6);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.1), transparent);
            transition: left 0.3s ease;
        }

        .option:hover::before {
            left: 100%;
        }

        .option:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--primary-1);
            transform: translateX(5px);
        }

        .option.selected {
            background: rgba(139, 92, 246, 0.25);
            border-color: var(--primary-1);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }

        .option-letter {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-2);
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .option.selected .option-letter {
            background: var(--gradient-1);
        }

        .option-text {
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-2);
            position: relative;
            z-index: 1;
        }

        .option.selected .option-text {
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.prev {
            background: transparent;
            border: 2px solid var(--primary-1);
            color: var(--primary-1);
        }

        .nav-btn.prev:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .nav-btn.next {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 5px 30px rgba(139, 92, 246, 0.4);
        }

        .nav-btn.next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(139, 92, 246, 0.5);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 结果页 */
        .result-page {
            padding: 40px 20px;
            text-align: center;
        }

        .result-header {
            margin-bottom: 40px;
            position: relative;
        }

        /* 人格头像 */
        .result-avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 24px;
        }

        .result-avatar-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            background: var(--gradient-1);
            border-radius: 30px;
            filter: blur(40px);
            opacity: 0.4;
            animation: avatarGlow 3s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.08); }
        }

        .result-avatar {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 24px;
            object-fit: cover;
            border: 3px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.3), 0 0 80px rgba(236, 72, 153, 0.15);
            z-index: 1;
            background: var(--bg-2);
        }

        .result-avatar-container.hidden {
            display: none;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            font-size: 14px;
            color: var(--primary-2);
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 16px;
            color: var(--text-3);
            margin-bottom: 16px;
        }

        .result-type {
            font-size: clamp(40px, 10vw, 64px);
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: resultGlow 2s ease-in-out infinite;
        }

        @keyframes resultGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.5)); }
        }

        .result-name {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 20px;
        }

        .result-quote {
            font-size: 18px;
            color: var(--primary-2);
            font-style: italic;
            padding: 20px;
            background: rgba(6, 182, 212, 0.1);
            border-radius: 16px;
            border-left: 4px solid var(--primary-2);
            text-align: left;
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }

        .result-quote::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 40px;
            color: var(--primary-2);
            opacity: 0.3;
            font-family: serif;
        }

        .result-desc {
            font-size: 16px;
            color: var(--text-2);
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 40px;
            text-align: left;
            padding: 24px;
            background: rgba(26, 26, 46, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .dimensions-result {
            margin-bottom: 40px;
        }

        .dimensions-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dimensions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .dimension-item {
            padding: 16px;
            background: rgba(15, 15, 26, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }

        .dimension-item:hover {
            border-color: var(--primary-1);
            transform: translateY(-3px);
        }

        .dimension-label {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        .dimension-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-2);
        }

        .games-section {
            margin-bottom: 40px;
        }

        .games-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .games-title::before,
        .games-title::after {
            content: '';
            width: 40px;
            height: 2px;
            background: var(--gradient-1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 700px;
            margin: 0 auto;
        }

        .game-card {
            padding: 24px 20px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-1);
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.2);
        }

        .game-card.highlight {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--primary-1);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .game-card.highlight .game-tag {
            background: rgba(139, 92, 246, 0.3);
            color: var(--primary-1);
        }

        .game-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            background: var(--gradient-2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
        }

        .game-initial {
            font-size: 28px;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;

            scores = { dedication: 0, social: 0, competitive: 0, exploration: 0, action: 0 };
            lastResultKey = null;
            document.getElementById('totalQ').textContent = questions.length;
            showPage('testPage');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} 题`;
            document.getElementById('questionText').textContent = q.text;
            
            const letters = ['A', 'B', 'C'];
            const container = document.getElementById('optionsContainer');
            container.innerHTML = q.options.map((opt, i) => `
                <div class="option ${answers[currentQuestion] === i ? 'selected' : ''}" onclick="selectOption(${i})">
                    <span class="option-letter">${letters[i]}</span>
                    <span class="option-text">${opt.text}</span>
                </div>
            `).join('');

            // 更新进度
            const progress = (currentQuestion / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;

            // 更新按钮
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = answers[currentQuestion] === undefined;
        }

        function selectOption(index) {
            const q = questions[currentQuestion];
            
            // 如果之前已选过，先减去旧选项分数
            if (answers[currentQuestion] !== undefined) {
                const oldScore = q.options[answers[currentQuestion]].score;
                for (let dim in oldScore) {
                    scores[dim] -= oldScore[dim];
                }
            }
            
            answers[currentQuestion] = index;
            
            // 累加新选项分数
            const selectedScore = q.options[index].score;
            for (let dim in selectedScore) {
                scores[dim] += selectedScore[dim];
            }

            // 更新选项样式
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                // 测试完成，显示加载
                showPage('loadingPage');
                setTimeout(showResult, 2000);
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // ==================== 结果计算 ====================
        function calculateResult() {
            // 动态计算maxScores：遍历所有题目，取每题对某维度最大可能分值的累加
            const dims = ['dedication', 'social', 'competitive', 'exploration', 'action'];
            const maxScores = {};
            dims.forEach(dim => {
                maxScores[dim] = 0;
                questions.forEach(q => {
                    let maxForQ = 0;
                    q.options.forEach(opt => {
                        if (opt.score[dim] > maxForQ) maxForQ = opt.score[dim];
                    });
                    maxScores[dim] += maxForQ;
                });
            });

            // 计算百分比
            const percentages = {};
            for (let dim of dims) {
                percentages[dim] = maxScores[dim] > 0 ? Math.round((scores[dim] / maxScores[dim]) * 100) : 0;
            }

            return matchPersonality(percentages);
        }

        function matchPersonality(pcts) {
            // 14种人格标准画像向量 (L=25, M=50, H=75)
            // 每种人格有独特的5维位置
            const profiles = {
                "GOD_HAND":          { dedication: 60, social: 25, competitive: 75, exploration: 30, action: 75 },
                "STRATEGIST":        { dedication: 60, social: 40, competitive: 55, exploration: 70, action: 50 },
                "SOCIAL_BUTTERFLY":  { dedication: 45, social: 75, competitive: 25, exploration: 40, action: 30 },
                "COLLECTOR":         { dedication: 75, social: 25, competitive: 25, exploration: 75, action: 35 },
                "CHILL_GAMER":       { dedication: 20, social: 40, competitive: 15, exploration: 30, action: 15 },
                "TOXIC_GAMER":       { dedication: 70, social: 55, competitive: 75, exploration: 25, action: 50 },
                "NIGHT_OWL":         { dedication: 75, social: 20, competitive: 65, exploration: 35, action: 55 },
                "CASUAL_CUTE":       { dedication: 35, social: 55, competitive: 15, exploration: 60, action: 15 },
                "HARDCORE":          { dedication: 75, social: 20, competitive: 50, exploration: 40, action: 75 },
                "GUILD_LEADER":      { dedication: 65, social: 75, competitive: 50, exploration: 40, action: 45 },
                "MOBILE_MASTER":     { dedication: 30, social: 50, competitive: 45, exploration: 30, action: 35 },
                "STORY_LOVER":       { dedication: 55, social: 25, competitive: 15, exploration: 75, action: 30 },
                "OPEN_WORLD":        { dedication: 45, social: 30, competitive: 20, exploration: 75, action: 45 },
                "GACHA_MASTER":      { dedication: 70, social: 35, competitive: 25, exploration: 65, action: 25 }
            };

            // 每种人格的关键维度（权重1.5），非关键维度权重1.0
            const keyDims = {
                "GOD_HAND":          ["competitive", "action"],
                "STRATEGIST":        ["exploration", "competitive"],
                "SOCIAL_BUTTERFLY":  ["social"],
                "COLLECTOR":         ["exploration", "dedication"],
                "CHILL_GAMER":       ["competitive", "dedication", "action"], // 反向关键
                "TOXIC_GAMER":       ["competitive", "dedication"],
                "NIGHT_OWL":         ["dedication", "competitive"],
                "CASUAL_CUTE":       ["action", "exploration"],
                "HARDCORE":          ["action", "dedication"],
                "GUILD_LEADER":      ["social", "dedication"],
                "MOBILE_MASTER":     ["dedication", "social"],
                "STORY_LOVER":       ["exploration", "competitive"],
                "OPEN_WORLD":        ["exploration", "action"],
                "GACHA_MASTER":      ["dedication", "exploration"]
            };

            let bestMatch = "CHILL_GAMER";
            let bestDist = Infinity;

            const dims = ['dedication', 'social', 'competitive', 'exploration', 'action'];

            for (let pKey in profiles) {
                const profile = profiles[pKey];
                const keys = keyDims[pKey] || [];
                let dist = 0;

                for (let dim of dims) {
                    const diff = pcts[dim] - profile[dim];
                    const weight = keys.includes(dim) ? 1.5 : 1.0;
                    dist += weight * diff * diff;
                }
                dist = Math.sqrt(dist);

                if (dist < bestDist) {
                    bestDist = dist;
                    bestMatch = pKey;
                }
            }

            return bestMatch;
        }

        function showResult() {
            lastResultKey = calculateResult();
            const resultKey = lastResultKey;
            const result = personalities[resultKey];

            // 填充头像
            const avatarContainer = document.getElementById('resultAvatarContainer');
            const avatarImg = document.getElementById('resultAvatar');
            avatarContainer.classList.remove('hidden');
            avatarImg.src = `all_images/${resultKey}.png`;

            // 填充结果
            document.getElementById('resultType').textContent = result.type;
            document.getElementById('resultName').textContent = result.name;
            document.getElementById('resultQuote').textContent = result.quote;
            document.getElementById('resultDesc').textContent = result.desc;

            // 渲染维度
            const dims = ['dedication', 'social', 'competitive', 'exploration', 'action'];
            const dimLabels = { dedication: '投入度', social: '社交性', competitive: '竞技心', exploration: '探索欲', action: '操作偏好' };
            const maxScores = {};
            dims.forEach(dim => {
                maxScores[dim] = 0;
                questions.forEach(q => {
                    let maxForQ = 0;
                    q.options.forEach(opt => {
                        if (opt.score[dim] > maxForQ) maxForQ = opt.score[dim];
                    });
                    maxScores[dim] += maxForQ;
                });
            });

            const dimensionsHtml = dims.map(dim => {
                const pct = maxScores[dim] > 0 ? Math.round((scores[dim] / maxScores[dim]) * 100) : 0;
                const level = pct >= 70 ? "极高" : pct >= 40 ? "中等" : "偏低";
                return `
                    <div class="dimension-item">
                        <div class="dimension-label">${dimLabels[dim]}：${result.dimensions[dim]}</div>
                        <div class="dimension-value">${level} (${pct}%)</div>
                    </div>
                `;
            }).join('');
            document.getElementById('dimensionsGrid').innerHTML = dimensionsHtml;

            // 渲染推荐游戏（强制添加皇室战争）
            const recommendedGames = [...result.games];
            if (!recommendedGames.includes("皇室战争")) {
                recommendedGames.push("皇室战争");
            }
            
            const gamesHtml = recommendedGames.slice(0, 6).map(g => {
                const gameInfo = allGames[g] || { tag: "推荐游戏" };
                const firstChar = g.charAt(0);
                const isHighlight = g === "皇室战争";
                return `
                    <div class="game-card ${isHighlight ? 'highlight' : ''}">
                        <div class="game-icon"><span class="game-initial">${firstChar}</span></div>
                        <div class="game-name">${g}</div>
                        <span class="game-tag">${gameInfo.tag}${isHighlight ? ' ⭐必玩' : ''}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('gamesGrid').innerHTML = gamesHtml;

            showPage('resultPage');
        }

        // 通用复制函数，兼容非HTTPS环境
        function copyTextToClipboard(text, successMsg) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    alert(successMsg);
                }).catch(() => {
                    fallbackCopy(text, successMsg);
                });
            } else {
                fallbackCopy(text, successMsg);
            }
        }

        function fallbackCopy(text, successMsg) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
                alert(successMsg);
            } catch (e) {
                alert('复制失败，请手动复制以下内容：\n\n' + text);
            }
            document.body.removeChild(ta);
        }

        // 复制完整人格分析结果
        function copyFullAnalysis() {
            const resultName = document.getElementById('resultName').textContent;
            const resultType = document.getElementById('resultType').textContent;
            const resultQuote = document.getElementById('resultQuote').textContent;
            const resultDesc = document.getElementById('resultDesc').textContent;
            
            // 获取推荐游戏列表
            const gameCards = document.querySelectorAll('#gamesGrid .game-card .game-name');
            const gamesList = Array.from(gameCards).map(g => g.textContent).join('、');
            
            const key = lastResultKey || 'CHILL_GAMER';
            const shareUrl = `${window.location.origin}${window.location.pathname}?type=${key}&name=${encodeURIComponent(resultName)}`;
            
            const fullText = `🎮 游戏人格测试结果

【${resultName}】(${resultType})

💬 ${resultQuote}

📝 ${resultDesc}

🎮 推荐游戏：${gamesList}

🔗 测测你的本命游戏：${shareUrl}`;

            copyTextToClipboard(fullText, '分析结果已复制到剪贴板，快去分享给朋友吧！');
        }

        // 复制分享链接
        function copyShareLink() {
            const key = lastResultKey || 'CHILL_GAMER';
            const result = personalities[key];
            const shareUrl = `${window.location.origin}${window.location.pathname}?type=${key}&name=${encodeURIComponent(result.name)}`;
            copyTextToClipboard(shareUrl, '分享链接已复制到剪贴板！');
        }

        // 检查URL参数，自动显示结果
        function checkUrlParams() {

            const type = params.get('type');
            const name = params.get('name');

            if (type && name) {
                // 延迟执行确保DOM已加载
                setTimeout(() => {
                    const result = personalities[type];
                    if (result) {
                        // 设置头像
                        const avatarContainer = document.getElementById('resultAvatarContainer');
                        const avatarImg = document.getElementById('resultAvatar');
                        avatarContainer.classList.remove('hidden');
                        avatarImg.src = `all_images/${type}.png`;

                        // 直接显示结果页面
                        document.getElementById('resultType').textContent = result.type;
                        document.getElementById('resultName').textContent = result.name;
                        document.getElementById('resultQuote').textContent = result.quote;
                        document.getElementById('resultDesc').textContent = result.desc;

                        // 计算并显示维度
                        const dimLabels = { dedication: '投入度', social: '社交性', competitive: '竞技心', exploration: '探索欲', action: '操作偏好' };
                        const dims = ['dedication', 'social', 'competitive', 'exploration', 'action'];

                        // 使用默认分数（因为没有实际答题）
                        const dimensionsHtml = dims.map(dim => {
                            const level = "中等";
                            return `
                                <div class="dimension-item">
                                    <div class="dimension-label">${dimLabels[dim]}：${result.dimensions[dim]}</div>
                                    <div class="dimension-value">${level}</div>
                                </div>
                            `;
                        }).join('');
                        document.getElementById('dimensionsGrid').innerHTML = dimensionsHtml;

                        // 渲染推荐游戏（强制添加皇室战争）
                        const recommendedGames = [...result.games];
                        if (!recommendedGames.includes("皇室战争")) {
                            recommendedGames.push("皇室战争");
                        }
            const gamesHtml = recommendedGames.slice(0, 6).map(g => {
                const gameInfo = allGames[g] || { tag: "推荐游戏" };
                const firstChar = g.charAt(0);
                const isHighlight = g === "皇室战争";
                return `
                    <div class="game-card ${isHighlight ? 'highlight' : ''}">
                        <div class="game-icon"><span class="game-initial">${firstChar}</span></div>
                        <div class="game-name">${g}</div>
                        <span class="game-tag">${gameInfo.tag}${isHighlight ? ' ⭐必玩' : ''}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('gamesGrid').innerHTML = gamesHtml;

                        showPage('resultPage');
                    }
                }, 100);
            }
        }

        function restartTest() {
            showPage('welcomePage');
        }

        // 初始化像素星星背景
        function initPixelStars() {
            const container = document.getElementById('pixelStars');
            if (!container) return;
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'pixel-star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        initPixelStars();
        checkUrlParams();
    </script>
